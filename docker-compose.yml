version: "3.9"

services:

  # ── PostgreSQL 15 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: adhesive_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: adhesive_erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d adhesive_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adhesive_erp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://erp_user:${POSTGRES_PASSWORD:-CHANGE_ME}@postgres:5432/adhesive_erp
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_USE_A_LONG_RANDOM_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DEBUG: ${DEBUG:-false}
      UPLOAD_DIR: /tmp/erp_uploads
      MAX_UPLOAD_SIZE: 10485760
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      EINVOICE_API_URL: ${EINVOICE_API_URL:-https://einv-apisandbox.nic.in}
      EINVOICE_API_USER: ${EINVOICE_API_USER:-}
      EINVOICE_API_PASS: ${EINVOICE_API_PASS:-}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
    volumes:
      - uploads_data:/tmp/erp_uploads
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: adhesive_erp_ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  uploads_data:
